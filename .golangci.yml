version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - (*bytes.Buffer).WriteString
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
  exclusions:
    rules:
      # Test files may be terser and use dynamic errors freely.
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/helmedeiros/amp
